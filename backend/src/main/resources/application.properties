spring.application.name=backend
# Storage configuration - set to 'R2' for cloud storage, or 'LOCAL' for local storage
storage.mode=R2

spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-test-query=SELECT 1
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}

auth.rate-limit.login.max-attempts=${AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:10}
auth.rate-limit.login.window-seconds=${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:900}
auth.rate-limit.password-reset.max-attempts=${AUTH_RATE_LIMIT_PASSWORD_RESET_MAX_ATTEMPTS:3}
auth.rate-limit.password-reset.window-seconds=${AUTH_RATE_LIMIT_PASSWORD_RESET_WINDOW_SECONDS:3600}
auth.rate-limit.password-reset.cooldown-seconds=${AUTH_RATE_LIMIT_PASSWORD_RESET_COOLDOWN_SECONDS:300}

# File upload configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true

# Upload directory configuration - using relative path to project root
uploads.directory=${UPLOADS_DIR:./uploads}

# Cloudflare R2 configuration (used in production profile)
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY:}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY:}
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:}
cloudflare.r2.bucket=${CLOUDFLARE_R2_BUCKET:munichweekly-photoupload}
cloudflare.r2.public-url=${CLOUDFLARE_R2_PUBLIC_URL:}

# Mailjet
mailjet.api.key=${MAILJET_API_KEY:}
mailjet.api.secret=${MAILJET_API_SECRET:}
app.frontend.url=${APP_FRONTEND_URL:https://munichweekly.art}

# Cloudflare Turnstile CAPTCHA for anonymous submissions
captcha.turnstile.secret-key=${TURNSTILE_SECRET_KEY:}
captcha.turnstile.verify-url=${TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
anonymous.upload-token.expiration-ms=${ANONYMOUS_UPLOAD_TOKEN_EXPIRATION_MS:900000}
votes.batch-status.max-submission-ids=${VOTES_BATCH_STATUS_MAX_SUBMISSION_IDS:200}
anonymous.vote.secret=${ANONYMOUS_VOTE_SECRET:}
anonymous.vote.cookie-secure=${ANONYMOUS_VOTE_COOKIE_SECURE:false}
anonymous.vote.cookie-max-age-seconds=${ANONYMOUS_VOTE_COOKIE_MAX_AGE_SECONDS:31536000}
anonymous.vote.token-issuance-max-attempts=${ANONYMOUS_VOTE_TOKEN_ISSUANCE_MAX_ATTEMPTS:50}
anonymous.vote.token-issuance-window-seconds=${ANONYMOUS_VOTE_TOKEN_ISSUANCE_WINDOW_SECONDS:600}
anonymous.vote.vote-attempt-max-attempts=${ANONYMOUS_VOTE_ATTEMPT_MAX_ATTEMPTS:200}
anonymous.vote.vote-attempt-window-seconds=${ANONYMOUS_VOTE_ATTEMPT_WINDOW_SECONDS:600}

spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# OpenAPI documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.writer-with-default-pretty-printer=true
